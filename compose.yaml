services:
  postgres:
    image: 'postgres:16'
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-darbuka}'
      - 'POSTGRES_USER=${POSTGRES_USER:-darbuka}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}'
    ports:
      - '5432:5432'
    volumes:
      - 'pgdata:/var/lib/postgresql/data'

volumes:
  pgdata: