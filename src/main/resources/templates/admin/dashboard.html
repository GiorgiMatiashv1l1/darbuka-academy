<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Darbuka Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100">

<nav class="border-b border-neutral-900">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <a th:href="@{/}" class="font-semibold">Darbuka Academy</a>
        <span class="text-sm text-amber-500">Admin</span>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-2xl font-semibold mb-8">Courses</h1>

    <div class="space-y-3">
        <a th:each="course : ${courses}"
           th:href="@{/admin/courses/{id}(id=${course.id})}"
           class="block border border-neutral-900 rounded-lg p-5 hover:border-neutral-700">
            <div class="flex items-center justify-between">
                <div>
                    <span class="text-xs uppercase tracking-wider text-amber-500" th:text="${course.level}">LEVEL</span>
                    <h2 class="mt-1 font-medium" th:text="${course.title}">Title</h2>
                </div>
                <span class="text-sm text-neutral-500"
                      th:text="'$' + ${#numbers.formatDecimal(course.priceCents / 100.0, 1, 2)}">$0</span>
            </div>
        </a>
    </div>
</div>

</body>
</html>
