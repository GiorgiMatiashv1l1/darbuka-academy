<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${lesson.title}">Lesson</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100">

<nav class="border-b border-neutral-900">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <a th:href="@{/}" class="font-semibold tracking-tight">Darbuka Academy</a>
        <a th:href="@{/courses/{level}(level=${course.level})}"
           class="text-sm text-neutral-400 hover:text-neutral-100">
            Back to course
        </a>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-12">

    <div class="aspect-video bg-neutral-900 rounded-lg overflow-hidden">
        <iframe class="w-full h-full"
                th:src="'https://www.youtube.com/embed/' + ${lesson.videoId}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; picture-in-picture"
                allowfullscreen>

        </iframe>
    </div>

    <h1 class="mt-8 text-3xl font-semibold tracking-tight" th:text="${lesson.title}">Title</h1>
    <p class="mt-3 text-neutral-400" th:text="${lesson.description}">Description</p>

    <form th:action="@{/courses/{level}/lessons/{id}/complete(level=${course.level}, id=${lesson.id})}"
          method="post" class="mt-6">
        <button th:if="${!completed}"
                class="px-4 py-2 border border-neutral-800 rounded text-sm hover:border-neutral-600">
            Mark as complete
        </button>
        <button th:if="${completed}"
                class="px-4 py-2 border border-emerald-800 text-emerald-400 rounded text-sm hover:border-emerald-600">
            ✓ Completed — mark incomplete
        </button>
    </form>

    <div class="mt-12 pt-6 border-t border-neutral-900 flex justify-between text-sm">
        <a th:if="${prev}"
           th:href="@{/courses/{level}/lessons/{id}(level=${course.level}, id=${prev.id})}"
           class="text-neutral-400 hover:text-amber-500">
            ← <span th:text="${prev.title}">Previous</span>
        </a>
        <span th:unless="${prev}"></span>

        <a th:if="${next}"
           th:href="@{/courses/{level}/lessons/{id}(level=${course.level}, id=${next.id})}"
           class="text-neutral-400 hover:text-amber-500">
            <span th:text="${next.title}">Next</span> →
        </a>
        <span th:unless="${next}"></span>
    </div>

</div>

</body>
</html>
