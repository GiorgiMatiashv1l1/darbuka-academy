<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${course.title} + ' — Darbuka Academy'">Course</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100">

<nav class="border-b border-neutral-900">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <a th:href="@{/}" class="font-semibold tracking-tight">Darbuka Academy</a>
        <div class="flex items-center gap-4 text-sm">
            <a sec:authorize="isAuthenticated()" th:href="@{/my-courses}"
               class="text-neutral-400 hover:text-neutral-100">My courses</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <button class="text-neutral-400 hover:text-neutral-100">Log out</button>
            </form>
            <a sec:authorize="!isAuthenticated()" th:href="@{/login}"
               class="text-neutral-400 hover:text-neutral-100">Log in</a>
        </div>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-16">

    <span class="text-xs uppercase tracking-wider text-amber-500"
          th:text="${course.level}">LEVEL</span>
    <h1 class="mt-3 text-4xl font-semibold tracking-tight" th:text="${course.title}">Title</h1>
    <p class="mt-4 text-neutral-400 max-w-2xl" th:text="${course.description}">Description</p>

    <div class="mt-8 flex items-center gap-6">
        <span class="text-3xl font-semibold"
              th:unless="${owned}"
              th:text="'$' + ${#numbers.formatDecimal(course.priceCents / 100.0, 1, 2)}">$0.00</span>

        <form th:unless="${owned}" th:action="@{/checkout/{id}(id=${course.id})}" method="post">
            <button class="px-6 py-3 bg-amber-500 text-neutral-950 font-medium rounded hover:bg-amber-400">
                Buy this course
            </button>
        </form>

        <span th:if="${owned}"
              class="px-4 py-2 border border-emerald-800 text-emerald-400 rounded text-sm">
            You own this course
        </span>
    </div>

    <h2 class="mt-16 mb-6 text-lg font-medium text-neutral-300">
        Lessons
        <span class="text-neutral-600" th:text="'(' + ${#lists.size(lessons)} + ')'"></span>
    </h2>

    <div class="border border-neutral-900 rounded-lg divide-y divide-neutral-900">

        <div th:each="lesson : ${lessons}"
             class="flex items-center gap-4 px-5 py-4">

            <span class="w-6 text-sm text-neutral-600" th:text="${lesson.position}">1</span>

            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                    <a th:if="${unlocked[lesson.id]}"
                       th:href="@{/courses/{level}/lessons/{id}(level=${course.level}, id=${lesson.id})}"
                       class="font-medium hover:text-amber-500"
                       th:text="${lesson.title}">Lesson title</a>

                    <span th:unless="${unlocked[lesson.id]}"
                          class="font-medium text-neutral-500"
                          th:text="${lesson.title}">Lesson title</span>

                    <span th:if="${lesson.freePreview}"
                          class="px-2 py-0.5 text-xs bg-amber-500/10 text-amber-500 rounded">
                        Free preview
                    </span>
                </div>
                <p class="mt-1 text-sm text-neutral-500 truncate"
                   th:text="${lesson.description}">Description</p>
            </div>

            <span class="text-sm text-neutral-600 shrink-0"
                  th:text="${lesson.durationSeconds / 60} + ':' + ${#strings.replace(#numbers.formatInteger(lesson.durationSeconds % 60, 2), ',', '')}">
                0:00
            </span>

            <span class="w-5 shrink-0 text-center">
                <span th:if="${unlocked[lesson.id]}" class="text-amber-500">▶</span>
                <span th:unless="${unlocked[lesson.id]}" class="text-neutral-700">🔒</span>
            </span>
        </div>

    </div>

    <p th:unless="${owned}" class="mt-6 text-sm text-neutral-500">
        Buy the course to unlock every lesson.
        <a sec:authorize="!isAuthenticated()" th:href="@{/register}"
           class="text-amber-500 hover:underline">Create an account</a>
    </p>

</div>

</body>
</html>
