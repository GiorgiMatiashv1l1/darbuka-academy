<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My courses — Darbuka Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-neutral-100">

<nav class="border-b border-neutral-900">
    <div class="max-w-4xl mx-auto px-6 h-16 flex items-center justify-between">
        <a th:href="@{/}" class="font-semibold tracking-tight">Darbuka Academy</a>
        <form th:action="@{/logout}" method="post">
            <button class="text-sm text-neutral-400 hover:text-neutral-100">Log out</button>
        </form>
    </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-16">
    <h1 class="text-3xl font-semibold tracking-tight">My courses</h1>

    <div th:if="${#lists.isEmpty(courses)}" class="mt-8 text-neutral-400">
        You haven't bought any courses yet.
        <a th:href="@{/}" class="text-amber-500 hover:underline">Browse courses</a>
    </div>

    <div class="mt-8 grid md:grid-cols-2 gap-6">
        <a th:each="course : ${courses}"
           th:href="@{/courses/{level}(level=${course.level})}"
           class="border border-neutral-900 rounded-lg p-6 hover:border-neutral-700">
            <span class="text-xs uppercase tracking-wider text-amber-500" th:text="${course.level}">LEVEL</span>
            <h2 class="mt-2 text-lg font-medium" th:text="${course.title}">Title</h2>
            <p class="mt-2 text-sm text-neutral-500">Continue learning →</p>
        </a>
    </div>
</div>

</body>
</html>
